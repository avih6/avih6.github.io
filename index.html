<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>avih6</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: #202124; text-align: center; }
        header { background: var(--primary); color: white; padding: 3rem 1rem; }
        h1 { margin: 0; font-size: 2.5rem; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; }
        .card h3 { margin: 0.5rem 0; color: var(--primary); }
        .btn-group { display: flex; gap: 10px; margin-top: 1rem; width: 100%; }
        .btn { flex: 1; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.2s; }
        .btn-store { background: var(--primary); color: white; }
        .btn-site { border: 1px solid var(--primary); color: var(--primary); }
        .btn:hover { opacity: 0.8; }
        footer { margin-top: 3rem; padding: 2rem; font-size: 0.9rem; color: #5f6368; }
    </style>
</head>
<body>

<header>
    <h1>avih6</h1>

</header>

<div class="container">

        <h3>Disabled Permit Check</h3>
        <div class="btn-group">
            <a href="#" class="btn btn-store">Google Play</a>
            <a href="disabled-permit/index.html" class="btn btn-site">App Site</a>
        </div>
    </div>

    <div class="card">
        <h3>New Driver</h3>
        <div class="btn-group">
            <a href="#" class="btn btn-store">Google Play</a>
            <a href="new-driver/index.html" class="btn btn-site">App Site</a>
        </div>
    </div>

    <div class="card">
        <h3>Hofesh!</h3>
        <div class="btn-group">
            <a href="#" class="btn btn-store">Google Play</a>
            <a href="hofesh/index.html" class="btn btn-site">App Site</a>
        </div>
    </div>

    <div class="card">
        <h3>QR Generator</h3>
        <div class="btn-group">
            <a href="#" class="btn btn-store">Google Play</a>
            <a href="qr-generator/index.html" class="btn btn-site">App Site</a>
        </div>
    </div>
</div>

<footer>

</html>
